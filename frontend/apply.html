<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leave Management System - Apply Leave</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <h2 class="nav-logo">LeaveMS</h2>
        <ul class="nav-menu">
            <li><a href="/">Home</a></li>
            <li><a href="/apply" class="active">Apply Leave</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/about">About</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <h1>Apply for Leave</h1>

    <div class="form-container">
        <form id="leaveForm">
            <div class="form-group">
                <label for="name">Employee Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="fromDate">From Date</label>
                <input type="date" id="fromDate" required>
            </div>

            <div class="form-group">
                <label for="toDate">To Date</label>
                <input type="date" id="toDate" required>
            </div>

            <div class="form-group">
                <label for="leaveType">Leave Type</label>
                <select id="leaveType" required>
                    <option value="Casual" selected>Casual Leave</option>
                    <option value="Medical">Medical Leave</option>
                </select>
            </div>

            <div class="form-group">
                <label for="reason">Reason</label>
                <textarea id="reason" placeholder="Please provide a reason for your leave request" rows="4"></textarea>
            </div>

            <button type="submit" class="btn-primary">Submit Application</button>
        </form>
    </div>

    <div id="successMessage" class="success-message" style="display: none;">
        <p>Leave application submitted successfully!</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
