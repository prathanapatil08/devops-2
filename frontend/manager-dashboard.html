<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leave Management System - Manager Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <h2 class="nav-logo">LeaveMS</h2>
        <ul class="nav-menu">
            <li><a href="/manager-dashboard" class="active">Dashboard</a></li>
            <li><a href="#" id="logoutBtn">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <h1>Leave Approval Dashboard</h1>

    <div class="dashboard-stats">
        <div class="stat-card">
            <h3>Total Requests</h3>
            <span id="managerTotalLeaves">0</span>
        </div>
        <div class="stat-card">
            <h3>Pending</h3>
            <span id="managerPendingLeaves" class="pending">0</span>
        </div>
        <div class="stat-card">
            <h3>Approved</h3>
            <span id="managerApprovedLeaves" class="approved">0</span>
        </div>
        <div class="stat-card">
            <h3>Rejected</h3>
            <span id="managerRejectedLeaves" class="rejected">0</span>
        </div>
        <div class="stat-card">
            <h3>Casual Leaves</h3>
            <span id="managerCasualLeaves">0</span>
        </div>
        <div class="stat-card">
            <h3>Medical Leaves</h3>
            <span id="managerMedicalLeaves">0</span>
        </div>
    </div>

    <h2>Leave Requests</h2>
    <div class="filter-panel">
        <div id="managerFilterButtons" class="filter-buttons">
            <button type="button" class="filter-btn active" data-filter="all">All</button>
            <button type="button" class="filter-btn" data-filter="pending">Pending</button>
            <button type="button" class="filter-btn" data-filter="approved">Approved</button>
            <button type="button" class="filter-btn" data-filter="rejected">Rejected</button>
        </div>
        <div class="type-filter">
            <label for="managerTypeFilter">Type:</label>
            <select id="managerTypeFilter">
                <option value="all">All</option>
                <option value="casual">Casual</option>
                <option value="medical">Medical</option>
            </select>
        </div>
    </div>
    <div id="managerLeaveList" class="leave-list manager-list"></div>
</div>

<script src="script.js?v=4"></script>
</body>
</html>
