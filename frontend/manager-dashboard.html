<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leave Management System - Manager Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <h2 class="nav-logo">LeaveMS</h2>
        <ul class="nav-menu">
            <li><a href="/manager-dashboard" class="active">Dashboard</a></li>
            <li><a href="#" id="logoutBtn">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <h1>Leave Approval Dashboard</h1>

    <div class="dashboard-stats">
        <div class="stat-card">
            <h3>Total Requests</h3>
            <span id="managerTotalLeaves">0</span>
        </div>
        <div class="stat-card">
            <h3>Pending</h3>
            <span id="managerPendingLeaves" class="pending">0</span>
        </div>
        <div class="stat-card">
            <h3>Approved</h3>
            <span id="managerApprovedLeaves" class="approved">0</span>
        </div>
        <div class="stat-card">
            <h3>Rejected</h3>
            <span id="managerRejectedLeaves" class="rejected">0</span>
        </div>
        <div class="stat-card">
            <h3>Casual Leaves</h3>
            <span id="managerCasualLeaves">0</span>
        </div>
        <div class="stat-card">
            <h3>Medical Leaves</h3>
            <span id="managerMedicalLeaves">0</span>
        </div>
    </div>

    <h2>Leave Requests</h2>
    <div id="managerLeaveList" class="leave-list manager-list"></div>
</div>

<script src="script.js"></script>
</body>
</html>
