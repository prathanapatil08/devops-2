<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leave Management System - Employee Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <h2 class="nav-logo">LeaveMS</h2>
        <ul class="nav-menu">
            <li><a href="/employee-dashboard" class="active">Dashboard</a></li>
            <li><a href="/apply">Apply Leave</a></li>
            <li><a href="#" id="logoutBtn">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <h1>My Leave Dashboard</h1>

    <div class="dashboard-stats">
        <div class="stat-card">
            <h3>Total Requests</h3>
            <span id="employeeTotalLeaves">0</span>
        </div>
        <div class="stat-card">
            <h3>Pending</h3>
            <span id="employeePendingLeaves" class="pending">0</span>
        </div>
        <div class="stat-card">
            <h3>Approved</h3>
            <span id="employeeApprovedLeaves" class="approved">0</span>
        </div>
        <div class="stat-card">
            <h3>Rejected</h3>
            <span id="employeeRejectedLeaves" class="rejected">0</span>
        </div>
    </div>

    <h2>My Leave Applications</h2>
    <div class="filter-panel">
        <div id="employeeFilterButtons" class="filter-buttons">
            <button type="button" class="filter-btn active" data-filter="all">All</button>
            <button type="button" class="filter-btn" data-filter="pending">Pending</button>
            <button type="button" class="filter-btn" data-filter="approved">Approved</button>
            <button type="button" class="filter-btn" data-filter="rejected">Rejected</button>
        </div>
        <div class="type-filter">
            <label for="employeeTypeFilter">Type:</label>
            <select id="employeeTypeFilter">
                <option value="all">All</option>
                <option value="casual">Casual</option>
                <option value="medical">Medical</option>
            </select>
        </div>
    </div>
    <ul id="employeeLeaveList" class="leave-list"></ul>
</div>

<script src="script.js?v=4"></script>
</body>
</html>
